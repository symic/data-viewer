        self.canvas = FigureCanvasTkAgg(self.fig, master=plot_frame)
        self.canvas.draw()
        self.canvas.get_tk_widget().pack(fill=tk.BOTH, expand=True)
        # === 新增：鼠标悬停显示浓度值 ===
        self.annotation = self.ax.annotate(
            "", xy=(0, 0), xytext=(15, 15),
            textcoords="offset points",
            bbox=dict(boxstyle="round,pad=0.3", facecolor="yellow", edgecolor="black", alpha=0.8),
            fontsize=10, fontweight="bold",
            arrowprops=dict(arrowstyle="->", connectionstyle="arc3,rad=0")
        )
        self.annotation.set_visible(False)
        
        # 绑定鼠标移动事件
        self.canvas.mpl_connect("motion_notify_event", self.on_hover)
        
    def on_hover(self, event):
        """鼠标悬停时显示浓度值和设备ID - 优化版"""
        if event.inaxes != self.ax:
            self.annotation.set_visible(False)
            self.canvas.draw_idle()
            return
        
        if self.display_df is None or self.display_df.empty or event.xdata is None or event.ydata is None:
            self.annotation.set_visible(False)
            self.canvas.draw_idle()
            return
        
        from matplotlib.dates import num2date, date2num
        mouse_dt = num2date(event.xdata).replace(tzinfo=None)
        mouse_y = event.ydata
        
        closest_text = ""
        closest_num_point = None
        min_dist = float('inf')
        
        # 检查所有选中的设备
        for dev in self.selected_devices:
            if dev not in self.device_ids:
                continue
            dd = self.display_df[self.display_df['device_id'] == dev]
            if dd.empty:
                continue
            
            # 向量化计算时间差，快速找到最近的点
            time_diffs = abs(dd[self.time_col] - mouse_dt).dt.total_seconds()
            min_time_idx = time_diffs.idxmin()
            min_time_diff = time_diffs[min_time_idx]
            
            # 如果时间差太大，跳过这个设备
            if min_time_diff > 60:
                continue
            
            row = dd.loc[min_time_idx]
            conc_diff = abs(row[self.value_col] - mouse_y)
            
            # 如果浓度差太大，跳过
            if conc_diff > 10:
                continue
            
            distance = min_time_diff + conc_diff * 5
            
            if distance < min_dist:
                min_dist = distance
                closest_text = f"设备: {dev}\n浓度: {row[self.value_col]:.2f} mg/m³\n时间: {row[self.time_col].strftime('%H:%M:%S')}"
                closest_num_point = (date2num(row[self.time_col]), row[self.value_col])
        
        if closest_num_point is not None:
            try:
                self.annotation.remove()
            except:
                pass
            
            self.annotation = self.ax.annotate(
                closest_text,
                xy=closest_num_point,
                xytext=(15, 15),
                textcoords="offset points",
                bbox=dict(boxstyle="round,pad=0.3", facecolor="yellow", edgecolor="orange", alpha=0.95),
                fontsize=10, fontweight="bold",
                color="black",
                arrowprops=dict(arrowstyle="->", connectionstyle="arc3,rad=0", color="orange", lw=2)
            )
            self.annotation.set_visible(True)
            self.annotation.set_zorder(100)
        else:
            try:
                self.annotation.set_visible(False)
            except:
                pass
        
        self.canvas.draw_idle()

