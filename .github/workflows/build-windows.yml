    def convert_timestamp(self, ts_value):
        if pd.isna(ts_value):
            return None
        try:
            ts = int(ts_value)
            return pd.Timestamp(ts, unit='s', tz='Asia/Shanghai').strftime("%Y-%m-%d %H:%M:%S")
        except:
            return str(ts_value)

    def get_color_by_level(self, value, max_value):
        """五等分颜色：红橙黄蓝绿"""
        if max_value <= 0:
            return "#00CC00"
        ratio = value / max_value
        if ratio > 0.8:
            return "#FF0000"  # 红
        elif ratio > 0.6:
            return "#FF8C00"  # 橙
        elif ratio > 0.4:
            return "#FFD700"  # 黄
        elif ratio > 0.2:
            return "#4169E1"  # 蓝
        else:
            return "#00CC00"  # 绿

