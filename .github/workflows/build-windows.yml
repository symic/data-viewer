    def generate_demo_data(self):
        """生成模拟数据"""
        devices = [f"DEV_{i:03d}" for i in range(1, 31)]
        start_time = datetime(2024, 1, 1, 8, 0, 0)
        data = []
        for i, dev in enumerate(devices):
            for t in range(200):
                ct = start_time + timedelta(seconds=t * 24)
                base = 30 + 20 * np.sin(t * 0.05 + i * 0.3)
                noise = random.uniform(-10, 10)
                conc = max(1, base + noise)
                data.append({'timestamp': ct, 'device_id': dev, 'pid': round(conc, 2)})
        
        self.combined_df = pd.DataFrame(data)
        self.device_ids = sorted(self.combined_df['device_id'].unique())
        self.selected_devices = self.device_ids.copy()
        self.original_df = self.combined_df.copy()
        self.display_df = self.combined_df.copy()
        
        self.create_device_checkboxes()
        self.update_time_range()
        self.plot_data()
        self.update_curve_status()
        self.update_point_page_devices()
        
        self.curve_status_label.config(text=f"已加载 {len(self.device_ids)} 个设备的模拟数据")

    def create_device_checkboxes(self):
        """创建设备复选框（带滚动条）"""
        for w in self.device_list_frame.winfo_children():
            w.destroy()
        self.device_vars = {}
        
        for did in self.device_ids:
            var = tk.BooleanVar(value=True)
            self.device_vars[did] = var
            cb = ttk.Checkbutton(self.device_list_frame, text=did, variable=var, command=self.on_device_check_change)
            cb.pack(anchor=tk.W, padx=5, pady=1)

    def on_device_check_change(self):
        self.selected_devices = [d for d, v in self.device_vars.items() if v.get()]
        if self.display_df is not None:
            self.plot_data()
            self.update_curve_status()
            self.update_point_page_devices()

    def select_all_devices(self):
        for v in self.device_vars.values():
            v.set(True)
        self.selected_devices = self.device_ids.copy()
        if self.display_df is not None:
            self.plot_data()
            self.update_curve_status()
            self.update_point_page_devices()

    def deselect_all_devices(self):
        for v in self.device_vars.values():
            v.set(False)
        self.selected_devices = []
        if self.display_df is not None:
            self.plot_data()
            self.update_curve_status()
            self.update_point_page_devices()

    def update_point_page_devices(self):
        """更新点位页面的可选设备列表"""
        for w in self.device_pool_frame.winfo_children():
            w.destroy()
        
        if not self.device_ids:
            ttk.Label(self.device_pool_frame, text="请先在左侧加载数据", foreground="gray").pack()
            return
        
        available = [d for d in self.selected_devices if d not in self.placed_devices]
        
        if not available:
            ttk.Label(self.device_pool_frame, text="所有设备已绑定或未选择设备", foreground="gray").pack()
            return
        
        row_frame = None
        for i, did in enumerate(available):
            if i % 8 == 0:
                row_frame = ttk.Frame(self.device_pool_frame)
                row_frame.pack(fill=tk.X, pady=2)
            btn = tk.Label(row_frame, text=did, bg="white", fg="black",
                          font=("Arial", 9, "bold"), width=10, height=1,
                          relief=tk.RAISED, cursor="hand2",
                          highlightthickness=0)               
            btn.pack(side=tk.LEFT, padx=3, pady=2)
            btn.bind("<Button-1>", lambda e, d=did: self.select_device_for_grid(d))

    def select_device_for_grid(self, device_id):
        self.selected_device_for_grid = device_id
        
        for w in self.device_pool_frame.winfo_children():
            for child in w.winfo_children():
                if isinstance(child, tk.Label):
                    if child.cget("text") == device_id:
                        child.configure(bg="#FF0000", fg="white",
                                        highlightbackground="#FF0000",
                                        activebackground="#FF0000")
                    else:
                        child.configure(bg="white", fg="black",
                                        highlightbackground="white",
                                        activebackground="white")
        
        self.point_status_label.config(text=f"已选中设备 {device_id}，请点击下方网格进行绑定")

    def grid_click(self, idx):
        """单击网格：拾取/移动/交换/填充"""
        r, c = idx // self.GRID_COLS, idx % self.GRID_COLS
        
        # 情况1：点击的是已绑定的网格
        if (r, c) in self.grid_positions:
            dev = self.grid_positions[(r, c)]
            
            # 如果已经有拾取的设备，进行交换
            if self.picked_device is not None:
                old_r, old_c = self.picked_position
                old_idx = old_r * self.GRID_COLS + old_c
                old_dev = self.grid_positions[(old_r, old_c)]
                
                # 交换两个设备的位置
                self.grid_positions[(old_r, old_c)] = dev
                self.grid_positions[(r, c)] = old_dev
                
                # 更新显示
                self.grid_buttons[old_idx].config(text=dev, bg="#E0E0E0", fg="black")
                self.grid_buttons[idx].config(text=old_dev, bg="#E0E0E0", fg="black")
                
                # 清除拾取状态
                self.picked_device = None
                self.picked_position = None
                self.point_status_label.config(text=f"设备 {old_dev} 与 {dev} 已交换位置")
                return
            
            # 没有拾取的设备，则拾取当前设备
            self.picked_device = dev
            self.picked_position = (r, c)
            
            # 高亮显示拾取的设备
            self.grid_buttons[idx].config(bg="#87CEEB", fg="black")
            self.point_status_label.config(text=f"已拾取设备 {dev}，请点击目标位置")
            return
        
        # 情况2：点击的是空格
        if self.picked_device is not None:
            # 有拾取的设备，移动到空格
            old_r, old_c = self.picked_position
            old_idx = old_r * self.GRID_COLS + old_c
            
            # 从旧位置移除
            del self.grid_positions[(old_r, old_c)]
            self.grid_buttons[old_idx].config(text="空", bg="#F0F0F0", fg="black")
            
            # 放置到新位置
            self.grid_positions[(r, c)] = self.picked_device
            self.grid_buttons[idx].config(text=self.picked_device, bg="#E0E0E0", fg="black")
            
            # 清除拾取状态
            self.picked_device = None
            self.picked_position = None
            self.point_status_label.config(text=f"设备已移动到新位置")
        else:
            # 没有拾取的设备，提示先选择
            if not self.selected_device_for_grid:
                messagebox.showinfo("提示", "请先在上方点击选择一个设备，或双击已绑定的设备退回")
                return
            
            # 从可选设备绑定到空格
            did = self.selected_device_for_grid
            self.selected_device_for_grid = None
            
            self.grid_positions[(r, c)] = did
            self.placed_devices.append(did)
            
            self.grid_buttons[idx].config(text=did, bg="#E0E0E0", fg="black")
            self.update_point_page_devices()
            self.point_status_label.config(text=f"设备 {did} 已绑定到位置 ({r+1}, {c+1})")

    def grid_double_click(self, idx):
        """双击网格：解除绑定，退回可选设备"""
        r, c = idx // self.GRID_COLS, idx % self.GRID_COLS
        
        # 检查该位置是否有设备
        if (r, c) not in self.grid_positions:
            return
        
        # 解除绑定
        dev = self.grid_positions.pop((r, c))
        self.placed_devices.remove(dev)
        self.grid_buttons[idx].config(text="空", bg="#F0F0F0", fg="black")
        
        # 清除拾取状态
        self.picked_device = None
        self.picked_position = None
        
        # 更新可选设备列表
        self.update_point_page_devices()
        self.point_status_label.config(text=f"设备 {dev} 已退回可选设备列表")

    def reset_grid_layout(self):
        #清除拾取状态
        self.picked_device = None
        self.picked_position = None

        self.grid_positions = {}
        self.placed_devices = []
        self.selected_device_for_grid = None
        for btn in self.grid_buttons:
            btn.configure(text="空", bg="#F0F0F0", fg="black")
        self.update_point_page_devices()
        self.anim_time_label.config(text="--:--:--")
        self.point_status_label.config(text="网格布局已重置")

    def auto_deploy(self):
        """一键部署：按列从上往下排，5-6-7-7顺序，居中排列"""
        # 1. 先重置当前布局
        self.reset_grid_layout()
        
        # 2. 获取可选设备列表（已选中且未绑定的设备）
        available = [d for d in self.selected_devices if d not in self.placed_devices]
        
        # 3. 取前25个设备
        deploy_devices = available[:25]
        
        # 4. 定义每列的设备数量（按列排）
        layout_pattern = [5, 6, 7, 7]  # 第1列5个，第2列6个，第3列7个，第4列7个
        
        # 5. 按列从上往下绑定，居中排列
        device_index = 0
        for col in range(len(layout_pattern)):
            count = layout_pattern[col]
            # 计算起始行，使该列居中（总行数为7）
            start_row = (self.GRID_ROWS - count) // 2
            
            for row_offset in range(count):
                if device_index >= len(deploy_devices):
                    break
                did = deploy_devices[device_index]
                
                # 实际行号 = 起始行 + 偏移
                actual_row = start_row + row_offset
                
                # 绑定设备到网格
                self.grid_positions[(actual_row, col)] = did
                self.placed_devices.append(did)
                
                # 更新网格显示
                slot_index = actual_row * self.GRID_COLS + col
                self.grid_buttons[slot_index].config(text=did, bg="#E0E0E0", fg="black")
                
                device_index += 1
            
            if device_index >= len(deploy_devices):
                break
        
        # 6. 更新可选设备列表
        self.update_point_page_devices()
        
        # 7. 更新状态
        count = len(self.placed_devices)
        self.point_status_label.config(text=f"一键部署完成：已部署 {count} 个设备")

    def toggle_animation(self):
        if self.animation_running:
            self.animation_paused = True
            self.animation_running = False
            self.start_btn.configure(text="▶ 继续")
            if self.animation_timer:
                self.root.after_cancel(self.animation_timer)
            self.point_status_label.config(text="动画已暂停")
        else:
            if self.animation_paused:
                self.animation_running = True
                self.animation_paused = False
                self.start_btn.configure(text="⏸ 暂停")
                self.run_animation_step()
                self.point_status_label.config(text="动画继续运行")
            else:
                if not self.grid_positions:
                    messagebox.showinfo("提示", "请先在网格中绑定设备")
                    return
                
                if self.display_df is not None and not self.display_df.empty:
                    start_time = self.display_df['timestamp'].min()
                    time_diffs = (self.combined_df['timestamp'] - start_time).abs()
                    self.animation_index = time_diffs.idxmin()
                else:
                    self.animation_index = 0
                
                self.animation_running = True
                self.animation_paused = False
                self.start_btn.configure(text="⏸ 暂停")
                self.run_animation_step()
                self.point_status_label.config(text="动画开始运行")

    def stop_animation(self):
        self.animation_running = False
        self.animation_paused = False
        if self.animation_timer:
            self.root.after_cancel(self.animation_timer)
            self.animation_timer = None
        
        # 清除拾取状态
        self.picked_device = None
        self.picked_position = None

        self.start_btn.configure(text="▶ 开始")
        
        if self.display_df is not None and not self.display_df.empty:
            start_time = self.display_df['timestamp'].min()
            time_diffs = (self.combined_df['timestamp'] - start_time).abs()
            self.animation_index = time_diffs.idxmin()
            self.anim_time_label.config(text=start_time.strftime("%H:%M:%S"))
            
            for (r, c), did in self.grid_positions.items():
                idx = r * self.GRID_COLS + c
                self.grid_buttons[idx].configure(text=did, bg="#E0E0E0", fg="black")
        
        self.point_status_label.config(text="动画已结束，已恢复到起始时间")

    def run_animation_step(self):
        if not self.animation_running:
            return
        
        if self.animation_index >= len(self.combined_df):
            self.animation_index = 0
        
        ct = self.combined_df['timestamp'].iloc[self.animation_index]
        self.anim_time_label.config(text=ct.strftime("%H:%M:%S"))
        
        bound = list(self.grid_positions.values())
        mask = self.combined_df['device_id'].isin(bound)
        max_val = self.combined_df[mask]['pid'].max() if mask.any() else 1
        
        for (r, c), did in self.grid_positions.items():
            idx = r * self.GRID_COLS + c
            dc = self.combined_df[(self.combined_df['device_id'] == did) & (self.combined_df['timestamp'] == ct)]
            if not dc.empty:
                val = dc['pid'].iloc[0]
                color = self.get_color_by_level(val, max_val)
                text_color = "white" if color in ["#FF0000", "#FF8C00", "#4169E1"] else "black"
                self.grid_buttons[idx].configure(bg=color, text=f"{val:.1f}", fg=text_color)
        
        self.curve_max_label.config(text=f"最大浓度值: {max_val:.2f} mg/m³")
        self.point_status_label.config(text=f"动画运行中 | 时间: {ct.strftime('%H:%M:%S')}")
        
        speed = self.speed_var.get()
        base_delay = 400
        delay = max(20, int(base_delay /speed)) #速度越快，延迟越小
        self.animation_index += 1
        self.animation_timer = self.root.after(delay, self.run_animation_step)

    def update_time_range(self):
        if self.display_df is not None and not self.display_df.empty:
            s = self.display_df['timestamp'].min()
            e = self.display_df['timestamp'].max()
            self.time_range_label.config(text=f"{s.strftime('%H:%M:%S')} 至 {e.strftime('%H:%M:%S')}")
            self.start_time_var.set(s.strftime('%H:%M:%S'))
            self.end_time_var.set(e.strftime('%H:%M:%S'))

    def update_curve_status(self):
        if self.display_df is not None and not self.display_df.empty and self.selected_devices:
            vis = self.display_df[self.display_df['device_id'].isin(self.selected_devices)]
            if not vis.empty:
                mr = vis.loc[vis['pid'].idxmax()]
                self.curve_max_label.config(text=f"最大浓度值: {mr['pid']:.2f} mg/m³ | 设备: {mr['device_id']} | 时间: {mr['timestamp'].strftime('%H:%M:%S')}")

    def setup_span_selector(self):
        if self.span_selector is not None:
            try:
                self.span_selector.disconnect_events()
            except:
                pass
        
        self.span_selector = SpanSelector(
            self.ax,
            self.on_span_select,
            direction='horizontal',
            useblit=True,
            props=dict(alpha=0.3, facecolor='yellow'),
            interactive=False,
            drag_from_anywhere=True
        )

    def on_span_select(self, xmin, xmax):
        if self.display_df is None or self.display_df.empty:
            return
        
        xmin_t = pd.Timestamp(xmin, unit='D')
        xmax_t = pd.Timestamp(xmax, unit='D')
        
        if (xmax_t - xmin_t).total_seconds() < 1:
            return
        
        self.zoom_history.append({'df': self.display_df.copy()})
        
        mask = (self.display_df['timestamp'] >= xmin_t) & (self.display_df['timestamp'] <= xmax_t)
        zoomed = self.display_df[mask].copy()
        
        if zoomed.empty:
            return
        
        self.display_df = zoomed
        self.plot_data(self.display_df)
        self.update_time_range()
        self.update_curve_status()
        self.curve_status_label.config(text=f"已放大: {xmin_t.strftime('%H:%M:%S')} - {xmax_t.strftime('%H:%M:%S')}")

    def plot_data(self, df=None):
        if df is None:
            df = self.display_df
        if df is None or df.empty:
            return
        
        self.ax.clear()
        visible = [d for d in self.selected_devices if d in self.device_ids]
        
        if not visible:
            self.ax.text(0.5, 0.5, "请勾选要显示的设备", ha='center', va='center', fontsize=14, transform=self.ax.transAxes)
            self.canvas.draw()
            return
        
        colors = plt.cm.tab20(np.linspace(0, 1, len(visible)))
        for i, dev in enumerate(visible):
            dd = df[df['device_id'] == dev]
            if not dd.empty:
                self.ax.plot(dd['timestamp'], dd['pid'], color=colors[i], alpha=0.7, linewidth=0.8, label=dev)
                mi = dd['pid'].idxmax()
                mp = dd.loc[mi]
                self.ax.annotate(dev, xy=(mp['timestamp'], mp['pid']), xytext=(8, 8),
                               textcoords='offset points', fontsize=8, color=colors[i], fontweight='bold',
                               bbox=dict(boxstyle='round,pad=0.2', facecolor='white', edgecolor='none', alpha=0.6))
        
        self.ax.set_title(f"浓度曲线 (显示{len(visible)}个设备)")
        self.ax.set_xlabel("时间")
        self.ax.set_ylabel("浓度值 (mg/m³)")
        self.ax.grid(True, alpha=0.3)
        self.ax.xaxis.set_major_formatter(DateFormatter('%H:%M:%S'))
        self.fig.autofmt_xdate(rotation=45)
        
        self.setup_span_selector()
        
        self.canvas.draw()

        self.update_curve_status_based_on_current_view(df, visible)

    def update_curve_status_based_on_current_view(self, df, vis):
        """根据当前缩放的视图更新状态栏"""
        if df is None or df.empty or not vis:
            return
        
        # 只计算当前显示范围内的设备数据
        current_data = df[df['device_id'].isin(vis)]
        
        if current_data.empty:
            return
        
        # 找到当前视图中的最大值
        max_row = current_data.loc[current_data[self.value_col].idxmax()]
        max_value = max_row[self.value_col]
        max_device = max_row['device_id']
        max_time = max_row[self.time_col]
        
        # 更新状态栏
        self.curve_max_label.config(
            text=f"最大浓度值: {max_value:.2f} mg/m³ | 设备: {max_device} | 时间: {max_time.strftime('%H:%M:%S')}"
        )
        
        # 更新统计信息
        device_count = len(current_data['device_id'].unique())
        row_count = len(current_data)
        self.curve_stats_label.config(
            text=f"显示设备数: {device_count} | 数据行数: {row_count}"
